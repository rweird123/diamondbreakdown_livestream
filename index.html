
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Breakdown LIVE</title>
<style>
:root {
  --bg-deep: #0b0f1e;
  --bg-card: #131a30;
  --bg-card-hover: #1a2240;
  --green-primary: #1e7a3a;
  --green-dark: #164d28;
  --green-light: #28a04d;
  --red-primary: #c4243a;
  --red-light: #e84258;
  --white: #ffffff;
  --white-muted: #c0c8e0;
  --white-dim: #7a84a0;
  --hot-color: #ff6b35;
  --hot-bg: rgba(255,107,53,0.12);
  --cold-color: #3b8ef6;
  --cold-bg: rgba(59,142,246,0.12);
  --live-green: #22c55e;
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(30,122,58,0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--white);
  font-family: "SF Pro Display", "Helvetica Neue", -apple-system, system-ui, sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

.dashboard {
  display: grid;
  grid-template-columns: 280px minmax(0, 1fr);
  grid-template-rows: 64px minmax(0, 1fr) 48px;
  height: 100vh;
  width: 100vw;
  gap: 0;
}

/* ========== HEADER ========== */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: linear-gradient(180deg, #111832 0%, var(--bg-deep) 100%);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.header-left { display: flex; align-items: center; gap: 16px; }

.header-title { display: flex; flex-direction: column; line-height: 1.1; }

.header-title .brand {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.header-title .sub {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--green-light);
  display: flex;
  align-items: center;
  gap: 6px;
}

.live-dot {
  width: 7px;
  height: 7px;
  background: var(--live-green);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 6px var(--live-green);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.header-right { display: flex; align-items: center; gap: 20px; }

.header-date { font-size: 13px; color: var(--white-muted); font-weight: 500; }

.header-clock {
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
}

.api-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--white-dim);
  background: rgba(255,255,255,0.04);
  padding: 4px 10px;
  border-radius: 4px;
}

.api-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--live-green); }
.api-dot.offline { background: var(--red-primary); }

/* ========== SCOREBOARD SIDEBAR ========== */
.sidebar {
  background: rgba(0,0,0,0.2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.sidebar-header {
  padding: 14px 14px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white-dim);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: rgba(11,15,30,0.95);
  backdrop-filter: blur(8px);
  z-index: 2;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.game-count {
  background: var(--green-primary);
  color: var(--white);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  font-weight: 700;
}

.game-card {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}

.game-card:hover { background: var(--bg-card-hover); }
.game-card.active {
  background: var(--bg-card);
  border-left: 3px solid var(--green-primary);
  padding-left: 11px;
}

.game-status {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 5px;
}

.game-status.live { color: var(--live-green); }
.game-status.final { color: var(--white-dim); }
.game-status.pre { color: var(--hot-color); }

.game-teams { display: flex; flex-direction: column; gap: 3px; }

.game-team-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 13px;
}

.team-info { display: flex; align-items: center; gap: 8px; min-width: 0; }

.team-abbr { font-weight: 700; width: 32px; font-size: 13px; }

.team-record { font-size: 10px; color: var(--white-dim); }

.team-score {
  font-weight: 800;
  font-size: 16px;
  font-variant-numeric: tabular-nums;
  min-width: 24px;
  text-align: right;
}

.team-score.winner { color: var(--green-light); }

.game-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
}

.game-pitchers {
  font-size: 10px;
  color: var(--white-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}

.game-runners-wrap {
  flex-shrink: 0;
  display: flex;
  align-items: center;
}

/* ========== MAIN CONTENT ========== */
.main {
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 20px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.main-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  min-width: 0;
}

/* Cards */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  min-width: 0;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
}

.card-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--white-dim);
}

.card-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.card-badge.green { background: rgba(30,122,58,0.2); color: var(--green-light); }
.card-badge.red { background: rgba(196,36,58,0.15); color: var(--red-light); }

.card-body { padding: 14px 16px 16px; }

/* Player of the Day Cards */
.player-card { grid-column: span 1; }

.player-hero {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 14px;
}

.player-avatar {
  width: 56px;
  height: 56px;
  border-radius: 8px;
  background: var(--bg-card-hover);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 800;
  color: var(--white-dim);
  flex-shrink: 0;
  border: 2px solid var(--border);
  overflow: hidden;
}

.player-avatar img { width: 100%; height: 100%; object-fit: cover; }

.player-info { min-width: 0; }

.player-name { font-size: 18px; font-weight: 800; line-height: 1.2; margin-bottom: 2px; }
.player-team { font-size: 12px; color: var(--white-dim); font-weight: 500; }
.player-position {
  font-size: 10px;
  color: var(--green-light);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-row { display: grid; gap: 2px; margin-bottom: 10px; }

.stat-row-header {
  display: grid;
  gap: 0;
  font-size: 9px;
  font-weight: 600;
  color: var(--white-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 0 4px;
  border-bottom: 1px solid var(--border);
}

.stat-row-values {
  display: grid;
  gap: 0;
  font-size: 16px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  padding: 6px 0 0;
}

.hitter-stats .stat-row-header,
.hitter-stats .stat-row-values {
  grid-template-columns: repeat(6, 1fr);
  text-align: center;
}

.pitcher-stats .stat-row-header,
.pitcher-stats .stat-row-values {
  grid-template-columns: repeat(6, 1fr);
  text-align: center;
}

.stat-period {
  font-size: 10px;
  color: var(--white-dim);
  font-weight: 600;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.stat-highlight { color: var(--green-light); }

/* Input fields */
.editable-input {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--white);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}

.editable-input:focus { border-color: var(--green-primary); }
.editable-input::placeholder { color: var(--white-dim); }
textarea.editable-input { resize: vertical; min-height: 48px; }

/* Hot & Cold */
.hotcold-card { grid-column: 1 / -1; }

.hotcold-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.hotcold-section-title {
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.hotcold-section-title.hot { color: var(--hot-color); }
.hotcold-section-title.cold { color: var(--cold-color); }

.hotcold-player {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  border-radius: 6px;
  margin-bottom: 4px;
  font-size: 12px;
  transition: background 0.15s;
}

.hotcold-player.hot-row { background: var(--hot-bg); }
.hotcold-player.cold-row { background: var(--cold-bg); }

.hotcold-player-name { font-weight: 700; font-size: 13px; }
.hotcold-player-team { color: var(--white-dim); font-size: 11px; margin-left: 6px; }

.hotcold-stat {
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  font-size: 14px;
}

.hotcold-stat.hot { color: var(--hot-color); }
.hotcold-stat.cold { color: var(--cold-color); }
.hotcold-stat-label { font-size: 10px; color: var(--white-dim); margin-left: 4px; }

/* The Call & Stat of the Day */
.call-card, .stat-card { grid-column: span 1; }

.call-prediction {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.4;
  padding: 12px 14px;
  background: rgba(30,122,58,0.08);
  border: 1px solid var(--border-accent);
  border-radius: 8px;
  min-height: 60px;
}

.call-status { display: flex; gap: 8px; margin-top: 10px; }

.call-btn {
  padding: 5px 14px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--white-dim);
  cursor: pointer;
  transition: all 0.15s;
}

.call-btn:hover { background: rgba(255,255,255,0.05); }
.call-btn.pending { border-color: var(--hot-color); color: var(--hot-color); }
.call-btn.hit { border-color: var(--green-light); color: var(--green-light); background: rgba(34,197,94,0.1); }
.call-btn.miss { border-color: var(--red-primary); color: var(--red-light); background: rgba(196,36,58,0.1); }

.stat-featured { text-align: center; padding: 10px 0; }

.stat-big-number {
  font-size: 42px;
  font-weight: 900;
  color: var(--green-light);
  line-height: 1;
  margin-bottom: 6px;
}

.stat-description {
  font-size: 13px;
  color: var(--white-muted);
  line-height: 1.4;
  max-width: 280px;
  margin: 0 auto;
}

/* Spotlight / Game Detail */
.spotlight-card { grid-column: 1 / -1; }

.spotlight-matchup {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 30px;
  padding: 10px 0;
}

.spotlight-team { text-align: center; }
.spotlight-team-name { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
.spotlight-team-record { font-size: 11px; color: var(--white-dim); }

.spotlight-score {
  font-size: 48px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
}

.spotlight-vs { font-size: 12px; color: var(--white-dim); font-weight: 600; }

.spotlight-detail {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-top: 12px;
}

.spotlight-detail-item {
  text-align: center;
  padding: 8px;
  background: rgba(255,255,255,0.03);
  border-radius: 6px;
}

.spotlight-detail-label {
  font-size: 10px;
  color: var(--white-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}

.spotlight-detail-value { font-size: 15px; font-weight: 700; }

.spotlight-bases-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Player Search Overlay */
.player-search-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}

.player-search-overlay.active { display: flex; }

.player-search-box {
  background: var(--bg-card);
  border: 1px solid var(--border-accent);
  border-radius: 12px;
  padding: 20px;
  width: 400px;
  max-width: 90vw;
}

.player-search-title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--white-dim);
}

.player-search-input {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-deep);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--white);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  margin-bottom: 10px;
}

.player-search-input:focus { border-color: var(--green-primary); }

.player-search-results { max-height: 250px; overflow-y: auto; }

.player-search-result {
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  transition: background 0.1s;
}

.player-search-result:hover { background: var(--bg-card-hover); }
.player-search-result .name { font-weight: 700; }
.player-search-result .meta { color: var(--white-dim); font-size: 11px; }

/* ========== BOTTOM BAR ========== */
.bottom-bar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 24px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.3);
  font-size: 11px;
  color: var(--white-dim);
  gap: 20px;
  min-height: 48px;
}

.bottom-standings {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  flex: 1;
}

.standing-item {
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.standing-rank { font-weight: 800; color: var(--white); font-size: 12px; }
.standing-team { font-weight: 600; color: var(--white-muted); }

.bottom-label {
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--green-light);
  white-space: nowrap;
}

/* Control Panel */
.controls {
  position: fixed;
  top: 72px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 50;
}

.ctrl-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--white-dim);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  transition: all 0.15s;
  white-space: nowrap;
}

.ctrl-btn:hover { background: var(--bg-card-hover); color: var(--white); }
.ctrl-btn.active { border-color: var(--green-primary); color: var(--green-light); }

/* Inline Edit Forms */
.inline-edit-form { display: flex; flex-direction: column; gap: 8px; }

.inline-edit-form input,
.inline-edit-form textarea {
  background: var(--bg-deep);
  border: 1px solid var(--border-accent);
  border-radius: 6px;
  color: var(--white);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 14px;
  width: 100%;
  outline: none;
}

.inline-edit-form textarea { resize: vertical; min-height: 50px; }
.inline-edit-form input:focus, .inline-edit-form textarea:focus { border-color: var(--green-primary); }

.inline-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }

.inline-edit-actions button {
  padding: 5px 14px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--white-dim);
  cursor: pointer;
  font-family: inherit;
}

.inline-edit-actions .save-btn {
  border-color: var(--green-primary);
  color: var(--green-light);
  background: rgba(30,122,58,0.15);
}

/* Print */
@media print {
  body { overflow: visible; }
  .dashboard { display: block; height: auto; }
  .controls { display: none; }
  .sidebar { page-break-after: always; }
}
</style>
</head>
<body>

<div class="dashboard">
  <header class="header">
    <div class="header-left">
      <div class="header-title">
        <span class="brand">Diamond Breakdown</span>
        <span class="sub"><span class="live-dot"></span> LIVE</span>
      </div>
    </div>
    <div class="header-right">
      <span class="header-date" id="headerDate"></span>
      <span class="header-clock" id="headerClock"></span>
      <div class="api-status">
        <span class="api-dot" id="apiDot"></span>
        <span id="apiLabel">DEMO MODE</span>
      </div>
    </div>
  </header>

  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="mainContent"></main>

  <footer class="bottom-bar">
    <span class="bottom-label">WC Race</span>
    <div class="bottom-standings" id="bottomStandings"></div>
  </footer>
</div>

<div class="player-search-overlay" id="playerSearchOverlay">
  <div class="player-search-box">
    <div class="player-search-title" id="searchTitle">Search Player</div>
    <input class="player-search-input" id="playerSearchInput" placeholder="Type a player name..." autocomplete="off"/>
    <div class="player-search-results" id="playerSearchResults"></div>
    <div style="margin-top:10px;text-align:right">
      <button class="ctrl-btn" onclick="closePlayerSearch()">Cancel</button>
    </div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="openPlayerSearch('pitcher')">Set Pitcher</button>
  <button class="ctrl-btn" onclick="openPlayerSearch('hitter')">Set Hitter</button>
  <button class="ctrl-btn" onclick="editTheCall()">Edit Call</button>
  <button class="ctrl-btn" onclick="editStatOfDay()">Edit Stat</button>
  <button class="ctrl-btn" id="refreshBtn" onclick="refreshData()">Refresh</button>
</div>

<script>
const MLB_API = 'https://statsapi.mlb.com/api/v1';
let useAPI = false;
let spotlightGamePk = null;

let state = {
  games: [],
  pitcherOfDay: null,
  hitterOfDay: null,
  theCall: { text: 'Ohtani goes yard tonight — book it.', status: 'pending' },
  statOfDay: { number: '117.4', unit: 'MPH', desc: "Stanton's hardest hit ball this season — hardest in MLB since Statcast began tracking" },
  hotPlayers: [],
  coldPlayers: [],
  standings: [],
  latestHomers: []
};

// -- Time --
function updateClock() {
  const now = new Date();
  document.getElementById('headerDate').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  document.getElementById('headerClock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// -- API --
async function tryAPI() {
  try {
    const today = new Date().toISOString().split('T')[0];
    const resp = await fetch(`${MLB_API}/schedule?date=${today}&sportId=1&hydrate=linescore,team,probablePitcher`);
    if (!resp.ok) throw new Error('API error');
    const data = await resp.json();
    if (data.dates && data.dates.length > 0) {
      useAPI = true;
      document.getElementById('apiDot').classList.remove('offline');
      document.getElementById('apiLabel').textContent = 'MLB API LIVE';
      return parseAPIGames(data.dates[0].games);
    }
  } catch(e) {}
  useAPI = false;
  document.getElementById('apiDot').classList.add('offline');
  document.getElementById('apiLabel').textContent = 'DEMO MODE';
  return null;
}

function parseAPIGames(apiGames) {
  return apiGames.map(g => {
    const ls = g.linescore || {};
    const away = g.teams.away;
    const home = g.teams.home;
    const statusCode = g.status.statusCode;
    let status = 'Pre-Game';
    let statusClass = 'pre';
    if (['I','MA','MB','MC','MD','ME','MF','MG','MH'].includes(statusCode) || statusCode === 'IP') {
      status = `${ls.inningHalf === 'Top' ? 'Top' : 'Bot'} ${ls.currentInning}`;
      statusClass = 'live';
    } else if (['F','FT','FR','FO','DR'].includes(statusCode)) {
      status = ls.currentInning > 9 ? `Final/${ls.currentInning}` : 'Final';
      statusClass = 'final';
    } else if (statusCode === 'S' || statusCode === 'PW') {
      const t = new Date(g.gameDate);
      status = t.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      statusClass = 'pre';
    }
    const awayPP = away.probablePitcher;
    const homePP = home.probablePitcher;
    return {
      gamePk: g.gamePk,
      away: { abbr: away.team.abbreviation || away.team.teamName.substring(0,3).toUpperCase(), name: away.team.teamName, record: `${away.leagueRecord.wins}-${away.leagueRecord.losses}`, score: away.score ?? 0 },
      home: { abbr: home.team.abbreviation || home.team.teamName.substring(0,3).toUpperCase(), name: home.team.teamName, record: `${home.leagueRecord.wins}-${home.leagueRecord.losses}`, score: home.score ?? 0 },
      status, statusClass,
      inning: ls.currentInning || 0,
      outs: ls.outs || 0,
      runners: { first: !!(ls.offense && ls.offense.first), second: !!(ls.offense && ls.offense.second), third: !!(ls.offense && ls.offense.third) },
      awayPitcher: awayPP ? awayPP.lastFirstName || awayPP.fullName || '' : '',
      homePitcher: homePP ? homePP.lastFirstName || homePP.fullName || '' : ''
    };
  });
}

// -- Team abbreviation lookup --
const TEAM_ABBREVS = {};

async function loadTeamAbbrevs() {
  try {
    const resp = await fetch(`${MLB_API}/teams?sportId=1`);
    if (!resp.ok) return;
    const data = await resp.json();
    if (data.teams) data.teams.forEach(t => { TEAM_ABBREVS[t.id] = t.abbreviation; TEAM_ABBREVS[t.name] = t.abbreviation; });
  } catch(e) {}
}

function getTeamAbbrev(leader) {
  if (leader.team) {
    if (leader.team.abbreviation) return leader.team.abbreviation;
    if (leader.team.id && TEAM_ABBREVS[leader.team.id]) return TEAM_ABBREVS[leader.team.id];
    if (leader.team.name && TEAM_ABBREVS[leader.team.name]) return TEAM_ABBREVS[leader.team.name];
    if (leader.team.teamName) return leader.team.teamName.substring(0,3).toUpperCase();
  }
  return '';
}

// -- Hot/Cold API fetch --
async function fetchHotCold() {
  if (!useAPI) return;
  try {
    const season = new Date().getFullYear();
    const [hotResp, coldResp] = await Promise.all([
      fetch(`${MLB_API}/stats/leaders?leaderCategories=battingAverage&season=${season}&statGroup=hitting&limit=10&statType=season&gameTypes=R&hydrate=team`),
      fetch(`${MLB_API}/stats/leaders?leaderCategories=battingAverage&season=${season}&statGroup=hitting&limit=10&statType=season&gameTypes=R&order=asc&hydrate=team`)
    ]);
    if (hotResp.ok) {
      const hotData = await hotResp.json();
      if (hotData.leagueLeaders && hotData.leagueLeaders[0] && hotData.leagueLeaders[0].leaders) {
        const leaders = hotData.leagueLeaders[0].leaders.slice(0, 5);
        if (leaders.length > 0) {
          state.hotPlayers = leaders.map(l => ({
            name: l.person.fullName,
            team: getTeamAbbrev(l),
            stat: l.value,
            label: 'AVG'
          }));
        }
      }
    }
    if (coldResp.ok) {
      const coldData = await coldResp.json();
      if (coldData.leagueLeaders && coldData.leagueLeaders[0] && coldData.leagueLeaders[0].leaders) {
        const leaders = coldData.leagueLeaders[0].leaders.slice(0, 5);
        if (leaders.length > 0) {
          state.coldPlayers = leaders.map(l => ({
            name: l.person.fullName,
            team: getTeamAbbrev(l),
            stat: l.value,
            label: 'AVG'
          }));
        }
      }
    }
  } catch(e) {}
}

// -- Latest Homers --
async function fetchLatestHomers() {
  if (!useAPI) return;
  try {
    const activeGames = state.games.filter(g => g.statusClass === 'live' || g.statusClass === 'final');
    if (!activeGames.length) return;
    const gamesToFetch = activeGames.slice(0, 10);
    const feeds = await Promise.all(gamesToFetch.map(g =>
      fetch(`${MLB_API}/game/${g.gamePk}/playByPlay`).then(r => r.ok ? r.json() : null).catch(() => null)
    ));
    const allHRs = [];
    feeds.forEach((feed, i) => {
      if (!feed || !feed.allPlays) return;
      const game = gamesToFetch[i];
      feed.allPlays.forEach(play => {
        if (play.result && play.result.event === 'Home Run' && play.matchup && play.matchup.batter) {
          const dist = play.hitData && play.hitData.totalDistance ? play.hitData.totalDistance : null;
          const launchSpeed = play.hitData && play.hitData.launchSpeed ? play.hitData.launchSpeed : null;
          allHRs.push({
            batter: play.matchup.batter.fullName,
            team: play.matchup.batter.id ? '' : '',
            distance: dist,
            exitVelo: launchSpeed,
            inning: play.about ? `${play.about.halfInning === 'top' ? 'T' : 'B'}${play.about.inning}` : '',
            desc: play.result.description || '',
            matchup: `${game.away.abbr} @ ${game.home.abbr}`,
            startTime: play.about ? play.about.startTime : ''
          });
        }
      });
    });
    allHRs.sort((a, b) => (b.startTime || '').localeCompare(a.startTime || ''));
    state.latestHomers = allHRs.slice(0, 5);
  } catch(e) { console.log('Homer fetch failed:', e); }
}

let PLAYER_DB = [];
let playerDBLoaded = false;

const PITCHER_POSITIONS = new Set(['P','SP','RP','CP','CL']);

async function loadFullPlayerDB() {
  try {
    const season = new Date().getFullYear();
    if (!Object.keys(TEAM_ABBREVS).length) await loadTeamAbbrevs();
    const resp = await fetch(`${MLB_API}/sports/1/players?season=${season}&hydrate=currentTeam`);
    if (!resp.ok) throw new Error('Player API error');
    const data = await resp.json();
    if (data.people && data.people.length > 0) {
      PLAYER_DB = data.people.map(p => {
        const pos = p.primaryPosition ? p.primaryPosition.abbreviation : '';
        const isPitcher = PITCHER_POSITIONS.has(pos);
        let teamAbbr = '';
        if (p.currentTeam) {
          teamAbbr = p.currentTeam.abbreviation || TEAM_ABBREVS[p.currentTeam.id] || TEAM_ABBREVS[p.currentTeam.name] || '';
        }
        return {
          id: p.id,
          name: p.fullName,
          team: teamAbbr,
          pos: pos,
          type: isPitcher ? 'pitcher' : 'hitter',
          number: p.primaryNumber || ''
        };
      }).sort((a, b) => a.name.localeCompare(b.name));
      playerDBLoaded = true;
      console.log(`Loaded ${PLAYER_DB.length} players from MLB API`);
    }
  } catch(e) {
    console.log('Full player DB fetch failed, trying roster fallback:', e);
    try {
      if (!Object.keys(TEAM_ABBREVS).length) await loadTeamAbbrevs();
      const resp = await fetch(`${MLB_API}/teams?sportId=1&hydrate=roster(person(stats(type=[season])))`);
      if (resp.ok) {
        const data = await resp.json();
        const players = [];
        if (data.teams) {
          data.teams.forEach(team => {
            const abbr = team.abbreviation || '';
            if (team.roster && team.roster.roster) {
              team.roster.roster.forEach(r => {
                const pos = r.position ? r.position.abbreviation : '';
                const isPitcher = PITCHER_POSITIONS.has(pos);
                players.push({
                  id: r.person.id,
                  name: r.person.fullName,
                  team: abbr,
                  pos: pos,
                  type: isPitcher ? 'pitcher' : 'hitter',
                  number: r.jerseyNumber || ''
                });
              });
            }
          });
        }
        if (players.length > 0) {
          PLAYER_DB = players.sort((a, b) => a.name.localeCompare(b.name));
          playerDBLoaded = true;
          console.log(`Loaded ${PLAYER_DB.length} players from roster fallback`);
        }

// -- Render Functions --

function renderRunners(runners, size) {
  const s = size || 28;
  const ds = Math.round(s * 0.24);
  const spread = Math.round(s * 0.27);
  const cx = s / 2;
  const cy = s / 2;
  const onColor = '#22c55e';
  const offColor = 'rgba(255,255,255,0.08)';
  const stroke = 'rgba(255,255,255,0.15)';
  const bases = [
    { x: cx, y: cy - spread, on: runners.second },
    { x: cx + spread, y: cy, on: runners.first },
    { x: cx - spread, y: cy, on: runners.third },
  ];
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" style="display:block">
    ${bases.map(b => `<rect x="${b.x - ds/2}" y="${b.y - ds/2}" width="${ds}" height="${ds}" rx="1"
      transform="rotate(45 ${b.x} ${b.y})"
      fill="${b.on ? onColor : offColor}" stroke="${stroke}" stroke-width="0.5"/>`).join('')}
  </svg>`;
}

function shortenPitcher(name) {
  if (!name) return '';
  const parts = name.split(', ');
  if (parts.length === 2) return parts[0];
  const space = name.lastIndexOf(' ');
  if (space > 0) return name.substring(space + 1);
  return name;
}

function renderSidebar(games) {
  const sidebar = document.getElementById('sidebar');
  let html = `<div class="sidebar-header">
    <span>All Games</span>
    <span class="game-count">${games.length}</span>
  </div>`;

  const sorted = [...games].sort((a,b) => {
    const order = { live: 0, final: 1, pre: 2 };
    return (order[a.statusClass] ?? 2) - (order[b.statusClass] ?? 2);
  });

  for (const g of sorted) {
    const isActive = g.gamePk === spotlightGamePk;
    const awayWin = g.statusClass === 'final' && g.away.score > g.home.score;
    const homeWin = g.statusClass === 'final' && g.home.score > g.away.score;
    const isLive = g.statusClass === 'live';
    const pitcherLine = (g.awayPitcher || g.homePitcher) ? `${shortenPitcher(g.awayPitcher)} vs ${shortenPitcher(g.homePitcher)}` : '';

    html += `<div class="game-card ${isActive ? 'active' : ''}" onclick="setSpotlight(${g.gamePk})">
      <div class="game-status ${g.statusClass}">
        ${isLive ? '<span class="live-dot"></span>' : ''}
        ${g.status}
        ${isLive ? ` · ${g.outs} out` : ''}
      </div>
      <div class="game-teams">
        <div class="game-team-row">
          <div class="team-info">
            <span class="team-abbr">${g.away.abbr}</span>
            <span class="team-record">${g.away.record}</span>
          </div>
          <span class="team-score ${awayWin ? 'winner' : ''}">${g.away.score}</span>
        </div>
        <div class="game-team-row">
          <div class="team-info">
            <span class="team-abbr">${g.home.abbr}</span>
            <span class="team-record">${g.home.record}</span>
          </div>
          <span class="team-score ${homeWin ? 'winner' : ''}">${g.home.score}</span>
        </div>
      </div>
      <div class="game-meta">
        <span class="game-pitchers">${pitcherLine}</span>
        ${isLive ? `<div class="game-runners-wrap">${renderRunners(g.runners, 26)}</div>` : ''}
      </div>
    </div>`;
  }
  sidebar.innerHTML = html;
}

function renderStandings() {
  const el = document.getElementById('bottomStandings');
  el.innerHTML = state.standings.map(s => {
    if (s.team === '|') return `<span style="color:var(--border);font-size:14px">|</span>`;
    return `<div class="standing-item">
      <span class="standing-rank">${s.rank}.</span>
      <span class="standing-team">${s.team}</span>
      <span style="color:${s.gb.startsWith('+') ? 'var(--green-light)' : 'var(--white-dim)'}">${s.gb}</span>
    </div>`;
  }).join('');
}

// -- Interactions --

function setSpotlight(gamePk) {
  spotlightGamePk = spotlightGamePk === gamePk ? null : gamePk;
  renderSidebar(state.games);
  renderMain();
}

function setCallStatus(status) {
  state.theCall.status = status;
  renderMain();
}

let editingCall = false;
let editingStat = false;

function editTheCall() {
  editingCall = true;
  renderMain();
  const el = document.getElementById('callEditInput');
  if (el) el.focus();
}

function saveTheCall() {
  const el = document.getElementById('callEditInput');
  if (el && el.value.trim()) {
    state.theCall.text = el.value.trim();
    state.theCall.status = 'pending';
  }
  editingCall = false;
  renderMain();
}

function cancelCallEdit() { editingCall = false; renderMain(); }

function editStatOfDay() {
  editingStat = true;
  renderMain();
  const el = document.getElementById('statEditNumber');
  if (el) el.focus();
}

function saveStatOfDay() {
  const num = document.getElementById('statEditNumber');
  const unit = document.getElementById('statEditUnit');
  const desc = document.getElementById('statEditDesc');
  if (num) state.statOfDay.number = num.value || state.statOfDay.number;
  if (unit) state.statOfDay.unit = unit.value || '';
  if (desc) state.statOfDay.desc = desc.value || state.statOfDay.desc;
  editingStat = false;
  renderMain();
}

function cancelStatEdit() { editingStat = false; renderMain(); }

// -- Player Search --
let searchMode = 'hitter';

function openPlayerSearch(mode) {
  searchMode = mode;
  document.getElementById('searchTitle').textContent = `Set ${mode === 'pitcher' ? 'Pitcher' : 'Hitter'} of the Day`;
  document.getElementById('playerSearchOverlay').classList.add('active');
  const input = document.getElementById('playerSearchInput');
  input.value = '';
  input.focus();
  renderSearchResults('');
}

function closePlayerSearch() {
  document.getElementById('playerSearchOverlay').classList.remove('active');
}

function renderSearchResults(query) {
  const el = document.getElementById('playerSearchResults');
  if (!PLAYER_DB.length) {
    el.innerHTML = '<div style="padding:12px;color:var(--white-dim);text-align:center;font-size:13px">Loading players...</div>';
    return;
  }
  const q = (query || '').toLowerCase();
  let results = PLAYER_DB.filter(p => {
    const matchType = searchMode === 'pitcher' ? p.type === 'pitcher' : p.type === 'hitter';
    const matchQuery = !q || p.name.toLowerCase().includes(q);
    return matchType && matchQuery;
  });
  if (!q) results = results.slice(0, 25);
  else results = results.slice(0, 40);
  const countLabel = playerDBLoaded ? `${PLAYER_DB.filter(p => searchMode === 'pitcher' ? p.type === 'pitcher' : p.type === 'hitter').length} players available` : '';
  el.innerHTML = (countLabel && !q ? `<div style="padding:4px 10px 8px;font-size:10px;color:var(--white-dim);letter-spacing:0.5px">${countLabel} — type to search</div>` : '') +
    results.map(p => {
      const safeName = p.name.replace(/'/g, "\\'");
      return `<div class="player-search-result" onclick="selectPlayer(${p.id}, '${safeName}', '${p.team}', '${p.pos}')">
        <span class="name">${p.name}</span>
        <span class="meta">${p.team} · ${p.pos}</span>
      </div>`;
    }).join('');
}

async function selectPlayer(id, name, team, pos) {
  closePlayerSearch();
  if (searchMode === 'pitcher') {
    state.pitcherOfDay = {
      name, team, position: pos, number: '--',
      season: { w: '-', l: '-', era: '-', ip: '-', k: '-', whip: '-', avg: '-' },
      last7: { w: '-', l: '-', era: '-', ip: '-', k: '-', whip: '-', avg: '-' },
      tonight: null
    };
    renderMain();
    await fetchPitcherStats(id);
  } else {
    state.hitterOfDay = {
      name, team, position: pos, number: '--',
      season: { avg: '-', hr: '-', rbi: '-', ops: '-', sb: '-', woba: '-' },
      last7: { avg: '-', hr: '-', rbi: '-', ops: '-', sb: '-', woba: '-' },
      tonight: null
    };
    renderMain();
    await fetchHitterStats(id);
  }
}

async function fetchHitterStats(playerId) {
  try {
    const season = new Date().getFullYear();
    const todayStr = new Date().toISOString().split('T')[0];
    const resp = await fetch(`${MLB_API}/people/${playerId}/stats?stats=season&season=${season}&group=hitting`);
    const data = await resp.json();
    if (data.stats && data.stats[0] && data.stats[0].splits && data.stats[0].splits[0]) {
      const s = data.stats[0].splits[0].stat;
      state.hitterOfDay.season = {
        avg: s.avg || '-', hr: s.homeRuns ?? '-', rbi: s.rbi ?? '-',
        ops: s.ops || '-', sb: s.stolenBases ?? '-', woba: s.obp || '-'
      };
      renderMain();
    }
    const glResp = await fetch(`${MLB_API}/people/${playerId}/stats?stats=gameLog&season=${season}&group=hitting`);
    const glData = await glResp.json();
    if (glData.stats && glData.stats[0] && glData.stats[0].splits) {
      const splits = glData.stats[0].splits;
      const last7 = splits.slice(-7);
      if (last7.length > 0) {
        let ab=0, h=0, hr=0, rbi=0, bb=0, sb=0, tb=0;
        last7.forEach(g => {
          const s = g.stat;
          ab += s.atBats||0; h += s.hits||0; hr += s.homeRuns||0;
          rbi += s.rbi||0; bb += s.baseOnBalls||0; sb += s.stolenBases||0;
          tb += s.totalBases||0;
        });
        state.hitterOfDay.last7 = {
          avg: ab > 0 ? (h/ab).toFixed(3) : '-', hr, rbi,
          ops: ab > 0 ? ((h+bb)/(ab+bb) + tb/ab).toFixed(3) : '-', sb, woba: '-'
        };
      }
      const todayGame = splits.find(g => g.date === todayStr);
      if (todayGame) {
        const s = todayGame.stat;
        state.hitterOfDay.tonight = {
          ab: s.atBats ?? 0, h: s.hits ?? 0, hr: s.homeRuns ?? 0,
          rbi: s.rbi ?? 0, bb: s.baseOnBalls ?? 0, k: s.strikeOuts ?? 0
        };
      }
      renderMain();
    }
  } catch(e) { console.log('Stats fetch failed:', e); }
}

async function fetchPitcherStats(playerId) {
  try {
    const season = new Date().getFullYear();
    const todayStr = new Date().toISOString().split('T')[0];
    const resp = await fetch(`${MLB_API}/people/${playerId}/stats?stats=season&season=${season}&group=pitching`);
    const data = await resp.json();
    if (data.stats && data.stats[0] && data.stats[0].splits && data.stats[0].splits[0]) {
      const s = data.stats[0].splits[0].stat;
      state.pitcherOfDay.season = {
        w: s.wins ?? '-', l: s.losses ?? '-', era: s.era || '-',
        ip: s.inningsPitched || '-', k: s.strikeOuts ?? '-',
        whip: s.whip || '-', avg: s.avg || '-'
      };
      state.pitcherOfDay.number = s.jerseyNumber || '--';
      renderMain();
    }
    const glResp = await fetch(`${MLB_API}/people/${playerId}/stats?stats=gameLog&season=${season}&group=pitching`);
    const glData = await glResp.json();
    if (glData.stats && glData.stats[0] && glData.stats[0].splits) {
      const splits = glData.stats[0].splits;
      const last7days = splits.slice(-3);
      if (last7days.length > 0) {
        let w=0, l=0, ip=0, k=0, bb=0, er=0, hits=0;
        last7days.forEach(g => {
          const s = g.stat;
          w += s.wins||0; l += s.losses||0;
          ip += parseFloat(s.inningsPitched||0); k += s.strikeOuts||0;
          er += s.earnedRuns||0; bb += s.baseOnBalls||0; hits += s.hits||0;
        });
        state.pitcherOfDay.last7 = {
          w, l, era: ip > 0 ? ((er / ip) * 9).toFixed(2) : '-',
          ip: ip.toFixed(1), k, whip: ip > 0 ? ((hits + bb) / ip).toFixed(2) : '-', avg: '-'
        };
      }
      const todayGame = splits.find(g => g.date === todayStr);
      if (todayGame) {
        const s = todayGame.stat;
        state.pitcherOfDay.tonight = {
          ip: s.inningsPitched || '0', h: s.hits ?? 0, r: s.runs ?? 0,
          er: s.earnedRuns ?? 0, k: s.strikeOuts ?? 0, bb: s.baseOnBalls ?? 0
        };
      }
      renderMain();
    }
  } catch(e) { console.log('Stats fetch failed:', e); }
}

document.getElementById('playerSearchInput').addEventListener('input', (e) => {
  renderSearchResults(e.target.value);
});

document.getElementById('playerSearchOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closePlayerSearch();
});

async function refreshData() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '...';
  const apiGames = await tryAPI();
  if (apiGames) state.games = apiGames;
  await Promise.all([fetchHotCold(), fetchLatestHomers()]);
  renderSidebar(state.games);
  renderMain();
  btn.textContent = 'Refresh';
}

setInterval(async () => {
  const apiGames = await tryAPI();
  if (apiGames) {
    state.games = apiGames;
    await Promise.all([fetchHotCold(), fetchLatestHomers()]);
    renderSidebar(state.games);
    if (!editingCall && !editingStat) renderMain();
  }
}, 15000);

async function init() {
  const mock = getMockPlayerData();
  state.pitcherOfDay = mock.pitcherOfDay;
  state.hitterOfDay = mock.hitterOfDay;
  state.hotPlayers = mock.hotPlayers;
  state.coldPlayers = mock.coldPlayers;
  state.standings = mock.standings;
  state.latestHomers = mock.latestHomers || [];

  await loadTeamAbbrevs();
  loadFullPlayerDB();

  const apiGames = await tryAPI();
  state.games = apiGames || getMockGames();
  if (useAPI) await Promise.all([fetchHotCold(), fetchLatestHomers()]);

  renderSidebar(state.games);
  renderMain();
  renderStandings();
}

init();
